<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Геометрия для детей</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shapes"></i> Геометрия
            </a>
            <div class="nav-links" id="navLinks">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Войти</a>
                <a href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-form">
                <h2>🔐 Вход в аккаунт</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Имя пользователя</label>
                        <input type="text" id="loginUsername" required placeholder="test или admin">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" id="loginPassword" required placeholder="test123 или admin123">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                <p class="auth-link">
                    Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a>
                </p>
                <p class="auth-link" style="font-size: 0.9rem;">
                    📝 Тестовые аккаунты:<br>
                    test / test123 (обычный)<br>
                    admin / admin123 (админ)
                </p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Обработчик формы входа
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = JSON.parse(localStorage.getItem('geometry_users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('geometry_current_user', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                alert('❌ Неверное имя пользователя или пароль');
            }
        });
    </script>
</body>
</html>
