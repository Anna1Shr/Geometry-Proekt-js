<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тема - Геометрия для детей</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shapes"></i> Геометрия
            </a>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </nav>

    <main class="container">
        <div class="topic-container" id="topicContainer">
            <p>Загрузка...</p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = parseInt(urlParams.get('id'));
        
        // Ждём загрузки данных из app.js
        function waitForData() {
            if (typeof topics !== 'undefined' && topics.length > 0) {
                renderTopic();
            } else {
                setTimeout(waitForData, 100);
            }
        }
        
        // ===== ЭТА ФУНКЦИЯ - ВСТАВЬТЕ ЕЁ СЮДА =====
        function renderTopic() {
            const topic = topics.find(t => t.id === topicId);
            
            if (!topic) {
                window.location.href = 'index.html';
                return;
            }
            
            // Загружаем прогресс
            let userProgress = JSON.parse(localStorage.getItem('geometry_progress') || '[]');
            let progress = userProgress.find(p => p.topicId === topicId);
            if (!progress) {
                progress = { topicId, completedTheory: false, completedSymbolic: false, completedDrawing: false, coinsEarned: 0 };
                userProgress.push(progress);
                localStorage.setItem('geometry_progress', JSON.stringify(userProgress));
            }
            
            function completeSection(section, reward) {
                if (!progress[`completed${section}`]) {
                    progress[`completed${section}`] = true;
                    progress.coinsEarned += reward;
                    
                    let currentUser = JSON.parse(localStorage.getItem('geometry_current_user'));
                    if (currentUser) {
                        currentUser.coins += reward;
                        localStorage.setItem('geometry_current_user', JSON.stringify(currentUser));
                        
                        const users = JSON.parse(localStorage.getItem('geometry_users') || '[]');
                        const userIndex = users.findIndex(u => u.id === currentUser.id);
                        if (userIndex !== -1) users[userIndex].coins = currentUser.coins;
                        localStorage.setItem('geometry_users', JSON.stringify(users));
                    }
                    
                    localStorage.setItem('geometry_progress', JSON.stringify(userProgress));
                    alert(`✅ Раздел завершен! +${reward} монет`);
                    location.reload();
                }
            }
            
            function showSection(section, btn) {
                document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`${section}-section`).classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            
            const container = document.getElementById('topicContainer');
            container.innerHTML = `
                <h1>${topic.title}</h1>
                <div class="topic-navigation">
                    <button class="nav-btn active" onclick="showSection('theory', this)">📖 Теория</button>
                    <button class="nav-btn" onclick="showSection('symbolic', this)">📝 Символическая запись</button>
                    <button class="nav-btn" onclick="showSection('drawing', this)">🎨 Рисунок</button>
                    <a href="tasks.html?topicId=${topicId}" class="nav-btn">❓ Задания</a>
                </div>
                
                <div id="theory-section" class="topic-section active">
                    <div class="section-header">
                        <h2>📖 Теория</h2>
                        ${!progress.completedTheory ? 
                            `<button class="complete-btn" onclick="completeSection('Theory', 10)">✅ Завершить (+10 🪙)</button>` : 
                            '<span class="completed-badge">✅ Пройдено +10 🪙</span>'}
                    </div>
                    <div class="theory-content">${topic.theoryContent.replace(/\n/g, '<br>')}</div>
                </div>
                
                <div id="symbolic-section" class="topic-section">
                    <div class="section-header">
                        <h2>📝 Символическая запись</h2>
                        ${!progress.completedSymbolic ? 
                            `<button class="complete-btn" onclick="completeSection('Symbolic', 15)">✅ Завершить (+15 🪙)</button>` : 
                            '<span class="completed-badge">✅ Пройдено +15 🪙</span>'}
                    </div>
                    <div class="symbolic-content"><pre>${topic.symbolicContent}</pre></div>
                </div>
                
                <div id="drawing-section" class="topic-section">
                    <div class="section-header">
                        <h2>🎨 Рисунок</h2>
                        ${!progress.completedDrawing ? 
                            `<button class="complete-btn" onclick="completeSection('Drawing', 20)">✅ Завершить (+20 🪙)</button>` : 
                            '<span class="completed-badge">✅ Пройдено +20 🪙</span>'
                        }
                    </div>
                    <div class="drawing-content">
                        <div class="drawing-placeholder" id="drawingPlaceholder"></div>
                    </div>
                </div>
            `;
            
            // Добавляем ТОЛЬКО картинку, БЕЗ текста
            const drawingDiv = document.getElementById('drawingPlaceholder');
            if (drawingDiv) {
                const img = document.createElement('img');
                img.src = `triangle${topicId}.png`;
                img.alt = topic.title;
                img.style.maxWidth = '100%';
                img.style.borderRadius = '10px';
                img.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
                img.onerror = function() {
                    drawingDiv.innerHTML = '<p style="color: #e74c3c; padding: 40px; text-align: center;">❌ Файл triangle' + topicId + '.png не найден! Добавьте рисунок в папку проекта.</p>';
                };
                drawingDiv.appendChild(img);
                // НЕТ ТЕКСТА ПОД КАРТИНКОЙ!
            }
            
            window.showSection = showSection;
            window.completeSection = completeSection;
        }
        // ===== КОНЕЦ ФУНКЦИИ =====
        
        waitForData();
    </script>
</body>
</html>
