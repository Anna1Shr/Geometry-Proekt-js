<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тема - Геометрия для детей</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shapes"></i> Геометрия
            </a>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </nav>

    <main class="container">
        <div class="topic-container" id="topicContainer">
            <p>Загрузка...</p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
function getSVGDrawing(topicId) {
    if (topicId === 1) {
        // Равнобедренный треугольник
        return `<svg width="400" height="350" viewBox="0 0 400 350" style="background: #f8f9fa; border-radius: 10px;">
    <!-- Треугольник -->
    <polygon points="200,50 80,280 320,280" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="3"/>
    
    <!-- Вершины -->
    <circle cx="200" cy="50" r="6" fill="#e74c3c"/>
    <circle cx="80" cy="280" r="6" fill="#e74c3c"/>
    <circle cx="320" cy="280" r="6" fill="#e74c3c"/>
    
    <!-- Подписи вершин -->
    <text x="210" y="40" fill="#2c3e50" font-size="18" font-weight="bold">B</text>
    <text x="55" y="295" fill="#2c3e50" font-size="18" font-weight="bold">A</text>
    <text x="330" y="295" fill="#2c3e50" font-size="18" font-weight="bold">C</text>
    
    <!-- Боковые стороны -->
    <text x="120" y="170" fill="#667eea" font-size="16" font-weight="bold">AB</text>
    <text x="260" y="170" fill="#667eea" font-size="16" font-weight="bold">BC</text>
    
    <!-- Основание -->
    <text x="180" y="315" fill="#e74c3c" font-size="16" font-weight="bold">Основание AC</text>
    
    <!-- Высота -->
    <line x1="200" y1="50" x2="200" y2="280" stroke="#48bb78" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="210" y="165" fill="#48bb78" font-size="16" font-weight="bold">Высота BH</text>
    
    <!-- Углы при основании -->
    <text x="95" y="235" fill="#f39c12" font-size="18" font-weight="bold">∠A</text>
    <text x="285" y="235" fill="#f39c12" font-size="18" font-weight="bold">∠C</text>
</svg>`;
    } 
    else if (topicId === 2) {
        // Равносторонний треугольник
        return `<svg width="400" height="350" viewBox="0 0 400 350" style="background: #f8f9fa; border-radius: 10px;">
    <!-- Треугольник -->
    <polygon points="200,40 330,290 70,290" fill="rgba(72,187,120,0.15)" stroke="#48bb78" stroke-width="3"/>
    
    <!-- Вершины -->
    <circle cx="200" cy="40" r="6" fill="#e74c3c"/>
    <circle cx="330" cy="290" r="6" fill="#e74c3c"/>
    <circle cx="70" cy="290" r="6" fill="#e74c3c"/>
    
    <!-- Подписи вершин -->
    <text x="210" y="30" fill="#2c3e50" font-size="18" font-weight="bold">A</text>
    <text x="340" y="305" fill="#2c3e50" font-size="18" font-weight="bold">B</text>
    <text x="45" y="305" fill="#2c3e50" font-size="18" font-weight="bold">C</text>
    
    <!-- Стороны -->
    <text x="130" y="170" fill="#48bb78" font-size="16" font-weight="bold">AB</text>
    <text x="250" y="170" fill="#48bb78" font-size="16" font-weight="bold">BC</text>
    <text x="180" y="320" fill="#48bb78" font-size="16" font-weight="bold">AC</text>
    
    <!-- Углы -->
    <text x="90" y="250" fill="#f39c12" font-size="18" font-weight="bold">60°</text>
    <text x="290" y="250" fill="#f39c12" font-size="18" font-weight="bold">60°</text>
    <text x="190" y="90" fill="#f39c12" font-size="18" font-weight="bold">60°</text>
    
    <!-- Высота -->
    <line x1="200" y1="40" x2="200" y2="290" stroke="#3498db" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="210" y="165" fill="#3498db" font-size="16" font-weight="bold">h</text>
    
    <!-- Окружности -->
    <circle cx="200" cy="185" r="35" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="245" y="140" fill="#9b59b6" font-size="14" font-weight="bold">r</text>
    
    <circle cx="200" cy="185" r="70" fill="none" stroke="#d69e2e" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="275" y="100" fill="#d69e2e" font-size="14" font-weight="bold">R</text>
</svg>`;
    }
    else if (topicId === 3) {
        // Прямоугольный треугольник
        return `<svg width="400" height="350" viewBox="0 0 400 350" style="background: #f8f9fa; border-radius: 10px;">
    <!-- Треугольник -->
    <path d="M 100 280 L 100 100 L 300 280 Z" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="3"/>
    
    <!-- Вершины -->
    <circle cx="100" cy="280" r="6" fill="#e74c3c"/>
    <circle cx="100" cy="100" r="6" fill="#e74c3c"/>
    <circle cx="300" cy="280" r="6" fill="#e74c3c"/>
    
    <!-- Подписи вершин -->
    <text x="75" y="300" fill="#2c3e50" font-size="18" font-weight="bold">A</text>
    <text x="75" y="80" fill="#2c3e50" font-size="18" font-weight="bold">B</text>
    <text x="310" y="295" fill="#2c3e50" font-size="18" font-weight="bold">C</text>
    
    <!-- Прямой угол -->
    <path d="M 100 250 L 130 250 L 130 280" fill="none" stroke="#ef4444" stroke-width="3"/>
    <text x="140" y="260" fill="#ef4444" font-size="16" font-weight="bold">90°</text>
    
    <!-- Катеты -->
    <text x="40" y="190" fill="#f39c12" font-size="16" font-weight="bold">AC (катет b)</text>
    <text x="170" y="305" fill="#48bb78" font-size="16" font-weight="bold">BC (катет a)</text>
    <text x="180" y="170" fill="#3498db" font-size="16" font-weight="bold">AB (гипотенуза c)</text>
</svg>`;
    }
    return '<p>Рисунок будет добавлен позже</p>';
}
</script>
    <script>
        // Данные тем (дублируем, т.к. app.js ещё не загружен)
        const topicsData = [
            { id: 1, title: "Равнобедренный треугольник", theoryContent: "Треугольник называется равнобедренным, если у него две стороны равны.\n\nСвойства:\n1. Углы при основании равны\n2. Биссектриса к основанию = медиана = высота", symbolicContent: "1. AB = BC\n2. ∠A = ∠C", drawingDescription: "Равнобедренный треугольник ABC (AB=BC)" },
            { id: 2, title: "Равносторонний треугольник", theoryContent: "Треугольник называется равносторонним, если все три стороны равны.\n\nСвойства:\n1. Все углы равны 60°\n2. Любая высота = медиана = биссектриса", symbolicContent: "1. AB = BC = AC\n2. ∠A = ∠B = ∠C = 60°", drawingDescription: "Равносторонний треугольник ABC" },
            { id: 3, title: "Прямоугольный треугольник", theoryContent: "Прямоугольный треугольник - треугольник с углом 90°.\n\nТеорема Пифагора: c² = a² + b²", symbolicContent: "1. ∠C = 90°\n2. a² + b² = c²", drawingDescription: "Прямоугольный треугольник ABC" }
        ];
        
        const urlParams = new URLSearchParams(window.location.search);
        const topicId = parseInt(urlParams.get('id'));
        const topic = topicsData.find(t => t.id === topicId);
        
        if (!topic) {
            window.location.href = 'index.html';
        }
        
        // Загружаем прогресс
        let userProgress = JSON.parse(localStorage.getItem('geometry_progress') || '[]');
        let progress = userProgress.find(p => p.topicId === topicId);
        if (!progress) {
            progress = { topicId, completedTheory: false, completedSymbolic: false, completedDrawing: false, coinsEarned: 0 };
            userProgress.push(progress);
            localStorage.setItem('geometry_progress', JSON.stringify(userProgress));
        }
        
        function completeSection(section, reward) {
            if (!progress[`completed${section}`]) {
                progress[`completed${section}`] = true;
                progress.coinsEarned += reward;
                
                let currentUser = JSON.parse(localStorage.getItem('geometry_current_user'));
                if (currentUser) {
                    currentUser.coins += reward;
                    localStorage.setItem('geometry_current_user', JSON.stringify(currentUser));
                    
                    const users = JSON.parse(localStorage.getItem('geometry_users') || '[]');
                    const userIndex = users.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) users[userIndex].coins = currentUser.coins;
                    localStorage.setItem('geometry_users', JSON.stringify(users));
                }
                
                localStorage.setItem('geometry_progress', JSON.stringify(userProgress));
                alert(`✅ Раздел завершен! +${reward} монет`);
                location.reload();
            }
        }
        
        const container = document.getElementById('topicContainer');
        container.innerHTML = `
            <h1>${topic.title}</h1>
            <div class="topic-navigation">
                <button class="nav-btn active" onclick="showSection('theory')">📖 Теория</button>
                <button class="nav-btn" onclick="showSection('symbolic')">📝 Символическая запись</button>
                <button class="nav-btn" onclick="showSection('drawing')">🎨 Рисунок</button>
                <a href="tasks.html?topicId=${topicId}" class="nav-btn">❓ Задания</a>
            </div>
            
            <div id="theory-section" class="topic-section active">
                <div class="section-header">
                    <h2>Теория</h2>
                    ${!progress.completedTheory ? 
                        `<button class="complete-btn" onclick="completeSection('Theory', 10)">✅ Завершить (+10 🪙)</button>` : 
                        '<span class="completed-badge">✅ Пройдено</span>'}
                </div>
                <div class="theory-content">${topic.theoryContent.replace(/\n/g, '<br>')}</div>
            </div>
            
            <div id="symbolic-section" class="topic-section">
                <div class="section-header">
                    <h2>Символическая запись</h2>
                    ${!progress.completedSymbolic ? 
                        `<button class="complete-btn" onclick="completeSection('Symbolic', 15)">✅ Завершить (+15 🪙)</button>` : 
                        '<span class="completed-badge">✅ Пройдено</span>'}
                </div>
                <div class="symbolic-content"><pre>${topic.symbolicContent}</pre></div>
            </div>
            
            <div id="drawing-section" class="topic-section">
                <div class="section-header">
                    <h2>Рисунок</h2>
                    ${!progress.completedDrawing ? 
                        `<button class="complete-btn" onclick="completeSection('Drawing', 20)">✅ Завершить (+20 🪙)</button>` : 
                        '<span class="completed-badge">✅ Пройдено</span>'}
                </div>
                <div class="drawing-content">
                    <div class="drawing-placeholder">
                        <i class="fas fa-drafting-compass fa-4x"></i>
                        <p>${topic.drawingDescription}</p>
                    </div>
                </div>
            </div>
        `;
        
        window.showSection = function(section) {
            document.querySelectorAll('.topic-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${section}-section`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };
        
        window.completeSection = completeSection;
    </script>
</body>
</html>
