<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин - Геометрия для детей</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-shapes"></i> Геометрия
            </a>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </nav>

    <main class="container">
        <div class="store-container">
            <h1>🪙 Магазин</h1>
            <div class="coins-display">
                <div class="coins-count">
                    <i class="fas fa-coins"></i>
                    <span id="userCoins">0</span>
                </div>
                <p>Ваш баланс</p>
            </div>
            <div class="store-items">
                <div class="store-item">
                    <div class="item-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <h3>⭐ Премиум задания</h3>
                    <p>Дополнительные сложные задания к каждой теме</p>
                    <div class="item-price">50 монет за задание</div>
                    <button class="btn btn-primary" onclick="alert('Скоро в обновлении!')">Купить</button>
                </div>
                <div class="store-item">
                    <div class="item-icon">
                        <i class="fas fa-palette"></i>
                    </div>
                    <h3>🎨 Тема оформления</h3>
                    <p>Смените цветовую схему сайта</p>
                    <div class="item-price">100 монет</div>
                    <button class="btn btn-primary" onclick="alert('Скоро в обновлении!')">Купить</button>
                </div>
                <div class="store-item">
                    <div class="item-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <h3>🏆 Ачивки</h3>
                    <p>Специальные достижения за успехи</p>
                    <div class="item-price">200 монет</div>
                    <button class="btn btn-primary" onclick="alert('Скоро в обновлении!')">Купить</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('geometry_current_user'));
        if (user) {
            document.getElementById('userCoins').innerText = user.coins;
        }
    </script>
</body>
</html>
